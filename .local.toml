# Memoh local development configuration
[log]
level = "debug"
format = "text"

[server]
addr = ":8080"

[admin]
username = "admin"
password = "admin123"
email = "dev@memoh.local"

[auth]
jwt_secret = "memoh-dev-secret-do-not-use-in-production"
jwt_expires_in = "168h"

timezone = "UTC"

[containerd]
socket_path = "/run/containerd/containerd.sock"
namespace = "default"

[workspace]
default_image = "debian:bookworm-slim"
snapshotter = "overlayfs"
data_root = "./data"
runtime_dir = "./runtime"
cni_bin_dir = "/opt/cni/bin"
cni_conf_dir = "/etc/cni/net.d"

[postgres]
host = "localhost"
port = 15432
user = "memoh"
password = "memoh123"
database = "memoh"
sslmode = "disable"

[qdrant]
base_url = "http://localhost:6334"
api_key = ""
timeout_seconds = 10

[browser_gateway]
host = "localhost"
port = 8083
server_addr = "localhost:8080"

[web]
host = "0.0.0.0"
port = 8082
